<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG选品助手 - 多平台智能选品</title>
<meta name="theme-color" content="#6366f1">
<!-- manifest removed: no manifest.json deployed -->
<style>
:root{
--bg:#0a0e1a;--bg2:#121826;--card:#1a2236;--text:#e4e7ec;--text2:#9ca3af;
--pri:#6366f1;--pri2:#8b5cf6;--acc:#00d4aa;--border:rgba(255,255,255,.08);--radius:12px;
--shadow:0 4px 24px rgba(0,0,0,.3);--glass:rgba(26,34,54,.6);
}
[data-theme="light"]{
--bg:#f5f7fa;--bg2:#eef1f6;--card:#fff;--text:#1a202c;--text2:#64748b;
--border:rgba(0,0,0,.08);--glass:rgba(255,255,255,.7);--shadow:0 4px 24px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s}
a{color:var(--pri2);text-decoration:none}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;cursor:pointer}
.nav-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:bold}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{color:var(--text2);padding:8px 14px;border-radius:8px;font-size:14px;transition:all .2s;cursor:pointer}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--card)}
.nav-right{display:flex;align-items:center;gap:12px}
.theme-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-btn:hover{border-color:var(--pri)}
.fav-btn{position:relative;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.fav-badge{position:absolute;top:-4px;right:-4px;background:var(--pri);color:#fff;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;display:none}
/* HERO */
.hero{min-height:420px;background:linear-gradient(160deg,#0f0c29 0%,#1a1a3e 40%,#2d1b69 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px 60px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 50%,rgba(99,102,241,.15) 0%,transparent 50%),radial-gradient(circle at 80% 30%,rgba(139,92,246,.15) 0%,transparent 50%)}
.hero h1{font-size:42px;font-weight:800;color:#fff;margin-bottom:12px;position:relative;background:linear-gradient(135deg,#fff 0%,#a29bfe 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:rgba(255,255,255,.7);font-size:16px;margin-bottom:30px;position:relative;max-width:600px}
.search-box{display:flex;gap:8px;max-width:560px;width:100%;position:relative}
.search-box input{flex:1;padding:14px 20px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);color:#fff;font-size:15px;outline:none;transition:all .2s}
.search-box input::placeholder{color:rgba(255,255,255,.5)}
.search-box input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(99,102,241,.2)}
.search-box button{padding:14px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.search-box button:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,.4)}
.hero-stats{display:flex;gap:40px;margin-top:40px;position:relative}
.hero-stat{text-align:center}
.hero-stat-num{font-size:32px;font-weight:800;color:#fff}
.hero-stat-label{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}
/* TABS */
.tabs{max-width:1200px;margin:0 auto;padding:20px;display:flex;gap:4px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 20px;border-radius:10px 10px 0 0;color:var(--text2);font-size:14px;cursor:pointer;white-space:nowrap;transition:all .2s;border-bottom:2px solid transparent}
.tab:hover{color:var(--text)}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}
/* CONTENT */
.content{max-width:1200px;margin:0 auto;padding:20px}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* FILTERS */
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s}
.filter-chip:hover{border-color:var(--pri);color:var(--text)}
.filter-chip.active{background:var(--pri);color:#fff;border-color:var(--pri)}
select.filter-select{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;outline:none}
/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.product-card{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer;position:relative}
.product-card:hover{transform:translateY(-4px);border-color:var(--pri);box-shadow:var(--shadow)}
.product-img{width:100%;height:180px;object-fit:cover;background:linear-gradient(135deg,var(--card),var(--bg2))}
.product-platform{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;color:#fff;backdrop-filter:blur(8px)}
.product-info{padding:12px}
.product-name{font-size:13px;color:var(--text);line-height:1.4;height:38px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.product-price{display:flex;align-items:baseline;gap:6px;margin-top:8px}
.product-price .now{font-size:20px;font-weight:700;color:var(--acc)}
.product-price .old{font-size:12px;color:var(--text2);text-decoration:line-through}
.product-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px;color:var(--text2)}
.product-meta .sales{color:var(--acc)}
.product-meta .profit{background:rgba(99,102,241,.15);color:var(--pri2);padding:2px 6px;border-radius:4px;font-weight:600}
.product-meta .rating{color:#f59e0b}
.fav-icon{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .2s}
.fav-icon:hover{background:rgba(0,0,0,.6)}
.fav-icon.faved{color:#ef4444}
/* PAGINATION */
.pagination{display:flex;gap:8px;justify-content:center;margin-top:24px}
.page-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s}
.page-btn:hover:not(:disabled){border-color:var(--pri);color:var(--text)}
.page-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
/* COMPARE */
.compare-section{margin-bottom:20px}
.compare-table{width:100%;border-collapse:collapse;background:var(--glass);backdrop-filter:blur(12px);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.compare-table th{padding:12px 16px;background:var(--card);color:var(--text2);font-size:13px;text-align:left;font-weight:600}
.compare-table td{padding:12px 16px;border-top:1px solid var(--border);font-size:14px}
.compare-table tr.lowest{background:rgba(0,212,170,.08)}
.compare-table tr.lowest td:first-child::before{content:'🏆 '}
.compare-table .price-cell{font-weight:700;font-size:16px}
.compare-table .price-cell.lowest{color:var(--acc)}
.bar-chart{display:flex;align-items:flex-end;gap:12px;height:200px;padding:20px;background:var(--glass);backdrop-filter:blur(12px);border-radius:var(--radius);border:1px solid var(--border);margin-top:16px}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bar{width:60%;min-height:4px;border-radius:6px 6px 0 0;transition:height .5s;position:relative}
.bar-label{font-size:11px;color:var(--text2);text-align:center}
.bar-value{font-size:12px;font-weight:600;color:var(--text)}
/* HOT LIST */
.hot-list{display:flex;flex-direction:column;gap:8px}
.hot-item{display:flex;align-items:center;gap:16px;padding:14px 16px;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);transition:all .2s}
.hot-item:hover{border-color:var(--pri)}
.hot-rank{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.hot-rank.r1{background:linear-gradient(135deg,#ffd700,#ffa500);color:#fff}
.hot-rank.r2{background:linear-gradient(135deg,#c0c0c0,#a8a8a8);color:#fff}
.hot-rank.r3{background:linear-gradient(135deg,#cd7f32,#b87333);color:#fff}
.hot-rank.r4{background:var(--card);color:var(--text2)}
.hot-info{flex:1;min-width:0}
.hot-name{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hot-meta{font-size:12px;color:var(--text2);margin-top:4px;display:flex;gap:12px}
.hot-price{font-size:18px;font-weight:700;color:var(--acc)}
.hot-trend{font-size:12px;padding:3px 8px;border-radius:6px}
.hot-trend.up{background:rgba(0,212,170,.15);color:var(--acc)}
.hot-trend.down{background:rgba(239,68,68,.15);color:#ef4444}
.hot-trend.flat{background:rgba(156,163,175,.15);color:var(--text2)}
/* PROFIT CALC */
.calc-box{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px;margin:0 auto}
.calc-form{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.calc-field{display:flex;flex-direction:column;gap:6px}
.calc-field label{font-size:13px;color:var(--text2)}
.calc-field input,.calc-field select{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none;transition:border .2s}
.calc-field input:focus,.calc-field select:focus{border-color:var(--pri)}
.calc-field.full{grid-column:1/-1}
.calc-btn{grid-column:1/-1;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.calc-btn:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,.4)}
.calc-result{margin-top:20px;display:none}
.calc-result.show{display:block;animation:fadeIn .3s}
.calc-result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px}
.calc-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.calc-row .label{color:var(--text2);font-size:14px}
.calc-row .value{font-weight:700;font-size:15px}
.calc-row.highlight .value{color:var(--acc);font-size:22px}
.calc-row.negative .value{color:#ef4444}
.pie-chart-container{display:flex;gap:30px;align-items:center;margin-top:16px;flex-wrap:wrap}
.pie-chart{width:160px;height:160px;border-radius:50%;position:relative}
.pie-legend{display:flex;flex-direction:column;gap:8px}
.pie-legend-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.pie-legend-color{width:14px;height:14px;border-radius:4px}
/* TRENDS */
.trend-section{margin-bottom:20px}
.trend-chart{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.trend-chart h3{font-size:14px;color:var(--text2);margin-bottom:12px}
canvas.chart-canvas{width:100%;height:200px;display:block}
.trend-score-card{display:flex;gap:16px;margin-bottom:16px}
.trend-score-item{flex:1;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.trend-score-num{font-size:28px;font-weight:800}
.trend-score-label{font-size:12px;color:var(--text2);margin-top:4px}
.trend-score-text{font-size:16px;font-weight:700;padding:4px 0}
/* FAVORITES MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:20px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:16px}
.fav-list-item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.fav-list-item img{width:50px;height:50px;border-radius:8px;object-fit:cover}
.fav-list-item .info{flex:1;min-width:0}
.fav-list-item .name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-list-item .price{color:var(--acc);font-weight:700}
.fav-list-item .remove{color:#ef4444;cursor:pointer;font-size:13px;padding:6px 12px;border-radius:6px;border:1px solid rgba(239,68,68,.3);background:transparent}
.fav-list-item .remove:hover{background:rgba(239,68,68,.1)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:14px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
/* FOOTER */
.footer{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px;border-top:1px solid var(--border);margin-top:40px}
.footer a{color:var(--pri2)}
/* RESPONSIVE */
@media(max-width:768px){
.hero h1{font-size:28px}
.hero-stats{gap:20px}
.hero-stat-num{font-size:24px}
.product-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.calc-form{grid-template-columns:1fr}
.nav-links{display:none}
.search-box{flex-direction:column}
.search-box button{width:100%}
.compare-table{font-size:12px}
.compare-table th,.compare-table td{padding:8px}
.pie-chart-container{flex-direction:column}
}
.loading{text-align:center;padding:40px;color:var(--text2)}
.skeleton-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);height:280px;overflow:hidden;position:relative}
.skeleton-card::after{content:"";position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.empty{text-align:center;padding:40px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<!-- NAV -->
<nav class="nav">
<div class="nav-logo" onclick="goHome()">
<div class="nav-logo-icon">SG</div>
<span>SG选品助手</span>
</div>
<div class="nav-links">
<a class="nav-link active" data-tab="hall" onclick="switchTab('hall')">选品大厅</a>
<a class="nav-link" data-tab="compare" onclick="switchTab('compare')">智能比价</a>
<a class="nav-link" data-tab="hot" onclick="switchTab('hot')">热销榜</a>
<a class="nav-link" data-tab="profit" onclick="switchTab('profit')">利润计算</a>
<a class="nav-link" data-tab="trends" onclick="switchTab('trends')">趋势分析</a>
</div>
<div class="nav-right">
<button class="fav-btn" onclick="openFavorites()">♡<span class="fav-badge" id="favBadge">0</span></button>
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>多平台智能选品助手</h1>
<p>覆盖淘宝、京东、拼多多、闲鱼、1688、抖音电商6大平台，288+商品数据，智能比价、利润计算、趋势分析一站式搞定</p>
<div class="search-box">
<input type="text" id="heroSearch" placeholder="输入商品关键词，如：手机、T恤、耳机..." onkeydown="if(event.key==='Enter')heroSearch()">
<button onclick="heroSearch()">🔍 搜索比价</button>
</div>
<div class="hero-stats">
<div class="hero-stat"><div class="hero-stat-num" id="statProducts">288+</div><div class="hero-stat-label">商品数据</div></div>
<div class="hero-stat"><div class="hero-stat-num">6</div><div class="hero-stat-label">电商平台</div></div>
<div class="hero-stat"><div class="hero-stat-num">8</div><div class="hero-stat-label">商品分类</div></div>
</div>
</section>

<!-- TABS -->
<div class="tabs" id="tabBar">
<div class="tab active" data-tab="hall" onclick="switchTab('hall')">📋 选品大厅</div>
<div class="tab" data-tab="compare" onclick="switchTab('compare')">💰 智能比价</div>
<div class="tab" data-tab="hot" onclick="switchTab('hot')">🔥 热销榜</div>
<div class="tab" data-tab="profit" onclick="switchTab('profit')">🧮 利润计算</div>
<div class="tab" data-tab="trends" onclick="switchTab('trends')">📈 趋势分析</div>
</div>

<!-- CONTENT -->
<div class="content">
<!-- 选品大厅 -->
<div class="tab-panel active" id="panel-hall">
<div class="filters">
<div class="filter-group" id="platformFilters"></div>
</div>
<div class="filters">
<div class="filter-group" id="categoryFilters"></div>
<select class="filter-select" id="sortSelect" onchange="loadProducts()">
<option value="sales">按销量排序</option>
<option value="price">价格从低到高</option>
<option value="price_desc">价格从高到低</option>
<option value="profit">按利润率排序</option>
<option value="trend">按趋势分排序</option>
<option value="rating">按评分排序</option>
</select>
</div>
<div class="product-grid" id="productGrid"></div>
<div class="pagination" id="pagination"></div>
</div>

<!-- 智能比价 -->
<div class="tab-panel" id="panel-compare">
<div class="search-box" style="max-width:560px;margin:0 auto 24px">
<input type="text" id="compareInput" placeholder="输入商品名称进行比价..." onkeydown="if(event.key==='Enter')doCompare()">
<button onclick="doCompare()">🔍 比价</button>
</div>
<div id="compareResult"></div>
</div>

<!-- 热销榜 -->
<div class="tab-panel" id="panel-hot">
<div class="filters">
<div class="filter-group" id="hotPlatformFilters"></div>
<select class="filter-select" id="hotCategorySelect" onchange="loadHot()">
<option value="全部">全部分类</option>
</select>
</div>
<div class="hot-list" id="hotList"></div>
</div>

<!-- 利润计算 -->
<div class="tab-panel" id="panel-profit">
<div class="calc-box">
<div class="calc-form">
<div class="calc-field">
<label>进货成本价 (¥)</label>
<input type="number" id="costPrice" placeholder="如：50" value="50">
</div>
<div class="calc-field">
<label>建议售价 (¥)</label>
<input type="number" id="sellPrice" placeholder="如：99" value="99">
</div>
<div class="calc-field">
<label>销售平台</label>
<select id="platformSelect" onchange="updateFeeRate()">
<option value="0.03">淘宝 (3%)</option>
<option value="0.05">京东 (5%)</option>
<option value="0.02">拼多多 (2%)</option>
<option value="0.01">闲鱼 (1%)</option>
<option value="0.005">1688 (0.5%)</option>
<option value="0.05">抖音电商 (5%)</option>
</select>

<div class="pie-legend-item"><div class="pie-legend-color" style="background:#f59e0b"></div>运费 ¥${d.shipping_cost}</div>

</div>

</div>`;
// 画饼图
drawPieChart(d.cost_price,d.platform_fee,d.shipping_cost,Math.abs(d.net_profit),profitable);
}

function drawPieChart(cost,fee,shipping,profit,profitable){
let canvas=document.getElementById("pieCanvas");
let ctx=canvas.getContext("2d");
let cx=80,cy=80,radius=70;
let total=cost+fee+shipping+profit;
if(total<=0)return;
let angles=[cost,fee,shipping,profit].map(v=>v/total*Math.PI*2);
let colors=["#6366f1","#ef4444","#f59e0b",profitable?"#00d4aa":"#ef4444"];
let startAngle=-Math.PI/2;
for(let i=0;i<4;i++){
ctx.beginPath();ctx.moveTo(cx,cy);
ctx.arc(cx,cy,radius,startAngle,startAngle+angles[i]);
ctx.closePath();ctx.fillStyle=colors[i];ctx.fill();
startAngle+=angles[i];
}
// 中心圆
ctx.beginPath();ctx.arc(cx,cy,30,0,Math.PI*2);ctx.fillStyle="var(--bg2)";ctx.fill();
ctx.fillStyle="var(--text)";ctx.font="bold 14px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
ctx.fillText(`${(profit/(cost+fee+shipping+profit)*100).toFixed(0)}%`,cx,cy);
}

function drawLineChart(canvasId,data,color){
let canvas=document.getElementById(canvasId);
let ctx=canvas.getContext("2d");
let w=canvas.offsetWidth,h=200;
canvas.width=w;canvas.height=h;
let max=Math.max(...data),min=Math.min(...data);
let range=max-min||1;
let step=w/(data.length-1);
ctx.clearRect(0,0,w,h);
// 网格线
ctx.strokeStyle="rgba(255,255,255,.05)";ctx.lineWidth=1;
for(let i=0;i<5;i++){let y=h*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
// 折线
ctx.strokeStyle=color;ctx.lineWidth=2;ctx.beginPath();
data.forEach((v,i)=>{
let x=i*step;let y=h-((v-min)/range)*h*0.8-h*0.1;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
});
ctx.stroke();
// 填充
ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
let grad=ctx.createLinearGradient(0,0,0,h);
grad.addColorStop(0,color+"33");grad.addColorStop(1,color+"00");
ctx.fillStyle=grad;ctx.fill();
}

if(!kw){showToast("请输入搜索关键词");return}
document.getElementById("compareInput").value=kw;
switchTab("compare");
doCompare();
window.scrollTo({top:document.querySelector(".tabs").offsetTop-60,behavior:"smooth"});
}

// ======== 启动 ========
init();
</script>
